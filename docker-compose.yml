version: '3.9'

services:

  app:
    build: .

    container_name: cicd-app

    ports:
      - "5000:5000"

    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cicd_db

    depends_on:
      - db

  db:
    image: postgres:15

    container_name: postgres-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cicd_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: